<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>farm ai</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111;
    --border: #1c1c1c;
    --border2: #252525;
    --text: #ededed;
    --muted: #444;
    --sub: #666;
    --code-bg: #141414;
    --sidebar-w: 240px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Geist', sans-serif;
    font-size: 15px;
    line-height: 1.65;
    height: 100dvh;
    display: flex;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }

  .sidebar-top {
    padding: 22px 14px 14px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'Geist Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: .12em;
    color: var(--text);
    text-transform: lowercase;
    margin-bottom: 14px;
  }

  .new-btn {
    width: 100%;
    background: var(--text);
    color: #0a0a0a;
    border: none;
    border-radius: 7px;
    padding: 9px 13px;
    font-family: 'Geist', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 7px;
    transition: opacity .15s;
    text-transform: lowercase;
  }
  .new-btn:hover { opacity: .85; }

  .chat-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 8px;
  }
  .chat-list::-webkit-scrollbar { width: 0; }

  .chat-item {
    padding: 8px 10px;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background .1s;
    min-width: 0;
  }
  .chat-item:hover { background: #161616; }
  .chat-item.active { background: #181818; }

  .chat-item-title {
    font-size: 12.5px;
    color: var(--sub);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
    transition: color .1s;
    text-transform: lowercase;
    font-family: 'Geist', sans-serif;
  }
  .chat-item:hover .chat-item-title,
  .chat-item.active .chat-item-title { color: #999; }

  .del-btn {
    background: none; border: none; cursor: pointer;
    color: transparent; font-size: 11px; padding: 2px 4px;
    border-radius: 3px; flex-shrink: 0;
    transition: color .1s;
  }
  .chat-item:hover .del-btn { color: var(--muted); }
  .del-btn:hover { color: #c0392b !important; }

  .sidebar-foot {
    padding: 13px 14px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 7px;
    font-family: 'Geist Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: lowercase;
    letter-spacing: .06em;
  }
  .conn-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--border2); flex-shrink: 0; }
  .conn-dot.on { background: #3d9e50; }

  /* ── Main ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    background: var(--bg);
  }

  .topbar {
    height: 50px;
    padding: 0 28px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .topbar-name {
    font-family: 'Geist Mono', monospace;
    font-size: 12px;
    letter-spacing: .06em;
    color: var(--sub);
    text-transform: lowercase;
  }
  .topbar-sep { color: var(--border2); }
  .topbar-sub {
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-transform: lowercase;
    letter-spacing: .04em;
  }

  /* ── Messages ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 40px 0 20px;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 2px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border2); }

  .msg {
    max-width: 680px;
    margin: 0 auto;
    padding: 6px 28px;
    animation: rise .15s ease;
  }
  @keyframes rise { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:none} }

  .msg + .msg.user { margin-top: 22px; }

  .msg-role {
    font-family: 'Geist Mono', monospace;
    font-size: 10px;
    letter-spacing: .1em;
    text-transform: lowercase;
    margin-bottom: 6px;
    color: var(--muted);
  }
  .msg.user .msg-role { color: #3a3a3a; }

  .msg-content {
    color: var(--sub);
    word-break: break-word;
    font-size: 14px;
  }

  /* bot response */
  .msg.bot .msg-content {
    color: #ccc;
    font-size: 14.5px;
    line-height: 1.75;
  }

  .msg-content code {
    font-family: 'Geist Mono', monospace;
    font-size: 12px;
    background: var(--code-bg);
    border: 1px solid var(--border2);
    padding: 1px 6px;
    border-radius: 4px;
    color: #888;
  }

  /* code blocks */
  .code-block {
    border: 1px solid var(--border2);
    border-radius: 8px;
    overflow: hidden;
    margin: 12px 0;
  }
  .code-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 14px;
    border-bottom: 1px solid var(--border2);
    background: #131313;
  }
  .code-lang {
    font-family: 'Geist Mono', monospace;
    font-size: 10px;
    letter-spacing: .1em;
    text-transform: lowercase;
    color: var(--muted);
  }
  .copy-btn {
    font-family: 'Geist Mono', monospace;
    font-size: 10px;
    letter-spacing: .06em;
    text-transform: lowercase;
    background: none;
    border: 1px solid var(--border2);
    border-radius: 4px;
    color: var(--muted);
    padding: 2px 8px;
    cursor: pointer;
    transition: .15s;
  }
  .copy-btn:hover { border-color: #444; color: #888; }
  .code-body {
    padding: 14px 16px;
    overflow-x: auto;
    font-family: 'Geist Mono', monospace;
    font-size: 12.5px;
    line-height: 1.7;
    color: #999;
    white-space: pre;
    background: var(--code-bg);
  }

  /* empty */
  .empty {
    max-width: 680px;
    margin: 90px auto 0;
    padding: 0 28px;
  }
  .empty-head {
    font-size: 28px;
    font-weight: 300;
    color: var(--text);
    line-height: 1.2;
    margin-bottom: 8px;
    letter-spacing: -.01em;
    text-transform: lowercase;
  }
  .empty-sub {
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-transform: lowercase;
    letter-spacing: .05em;
    margin-bottom: 28px;
  }
  .prompts { display: flex; flex-direction: column; gap: 5px; }
  .prompt-chip {
    background: none;
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 10px 14px;
    text-align: left;
    cursor: pointer;
    color: var(--muted);
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    text-transform: lowercase;
    letter-spacing: .02em;
    transition: .15s;
  }
  .prompt-chip:hover { border-color: var(--border2); color: var(--sub); background: var(--surface); }

  /* typing */
  .typing { display: flex; gap: 5px; align-items: center; padding: 6px 0; }
  .typing b { width: 4px; height: 4px; border-radius: 50%; background: var(--muted); display: block; animation: bl 1.2s infinite; }
  .typing b:nth-child(2){animation-delay:.2s}
  .typing b:nth-child(3){animation-delay:.4s}
  @keyframes bl{0%,80%,100%{opacity:.15}40%{opacity:.7}}

  /* ── Input ── */
  .input-wrap {
    border-top: 1px solid var(--border);
    padding: 16px 28px 20px;
    background: var(--surface);
    flex-shrink: 0;
  }
  .input-row {
    max-width: 680px;
    margin: 0 auto;
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  textarea {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Geist', sans-serif;
    font-size: 15px;
    line-height: 1.5;
    padding: 11px 14px;
    resize: none;
    outline: none;
    min-height: 46px;
    max-height: 160px;
    overflow-y: auto;
    transition: border-color .15s;
  }
  textarea:focus { border-color: #333; }
  textarea::placeholder { color: var(--muted); }
  textarea:disabled { opacity: .3; cursor: not-allowed; }

  .send {
    width: 46px; height: 46px;
    background: var(--text);
    border: none; border-radius: 8px;
    cursor: pointer; display: grid; place-items: center;
    flex-shrink: 0; transition: opacity .15s;
  }
  .send:hover { opacity: .85; }
  .send:disabled { background: var(--border2); cursor: not-allowed; opacity: 1; }
  .send svg { width: 14px; height: 14px; color: #0a0a0a; }
  .send:disabled svg { color: var(--muted); }

  .hint {
    text-align: center;
    font-family: 'Geist Mono', monospace;
    font-size: 10px;
    color: var(--border2);
    margin-top: 8px;
    letter-spacing: .04em;
    text-transform: lowercase;
  }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-top">
    <div class="logo">farm ai</div>
    <button class="new-btn" onclick="newChat()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      new chat
    </button>
  </div>
  <div class="chat-list" id="chatList"></div>
  <div class="sidebar-foot">
    <div class="conn-dot" id="connDot"></div>
    <span id="connText">connecting</span>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <span class="topbar-name" id="topName">farm ai</span>
    <span class="topbar-sep">—</span>
    <span class="topbar-sub" id="topSub">no chat selected</span>
  </div>

  <div id="messages">
    <div class="empty" id="emptyState">
      <div class="empty-head">what can i help with?</div>
      <div class="empty-sub">create a new chat to get started</div>
    </div>
  </div>

  <div class="input-wrap">
    <div class="input-row">
      <textarea id="inp" placeholder="message farm ai…" rows="1"
        onkeydown="onKey(event)" oninput="resize(this)" disabled></textarea>
      <button class="send" id="sendBtn" onclick="sendMsg()" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div class="hint">enter to send · shift+enter for new line</div>
  </div>
</div>

<script>
  const SERVER = "https://98.45.131.208:5000";
  let currentId = null;
  let busy = false;

  async function api(method, path, body) {
    const r = await fetch(SERVER + path, {
      method,
      headers: { "Content-Type": "application/json" },
      body: body ? JSON.stringify(body) : undefined,
    });
    return r.json();
  }

  async function loadChats() {
    try {
      const chats = await api("GET", "/chats");
      const list = document.getElementById("chatList");
      list.innerHTML = "";
      [...chats].reverse().forEach(c => {
        const el = document.createElement("div");
        el.className = "chat-item" + (c.id === currentId ? " active" : "");
        el.innerHTML = `
          <span class="chat-item-title">${esc(c.title || "new chat")}</span>
          <button class="del-btn" onclick="delChat(event,'${c.id}')">✕</button>`;
        el.addEventListener("click", () => openChat(c.id, c.title));
        list.appendChild(el);
      });
      setConn(true);
    } catch { setConn(false); }
  }

  async function newChat() {
    const data = await api("POST", "/chats");
    currentId = data.id;
    document.getElementById("messages").innerHTML = "";
    setTopbar("new chat", "");
    enableInput(true);
    document.getElementById("inp").focus();
    await loadChats();
  }

  async function openChat(id, title) {
    currentId = id;
    setTopbar((title || "chat").toLowerCase(), id);
    enableInput(true);
    const data = await api("GET", `/chats/${id}`);
    const msgs = document.getElementById("messages");
    msgs.innerHTML = "";
    data.messages.forEach(m => {
      if (m.role === "user") addUser(m.content);
      else addBot(m.content);
    });
    await loadChats();
  }

  async function delChat(e, id) {
    e.stopPropagation();
    await api("DELETE", `/chats/${id}`);
    if (currentId === id) {
      currentId = null;
      document.getElementById("messages").innerHTML = `
        <div class="empty" id="emptyState">
          <div class="empty-head">what can i help with?</div>
          <div class="empty-sub">create a new chat to get started</div>
        </div>`;
      setTopbar("farm ai", "no chat selected");
      enableInput(false);
    }
    await loadChats();
  }

  async function sendMsg() {
    if (busy || !currentId) return;
    const inp = document.getElementById("inp");
    const text = inp.value.trim();
    if (!text) return;
    inp.value = ""; resize(inp);
    busy = true;
    enableInput(false);

    const es = document.getElementById("emptyState");
    if (es) es.remove();

    addUser(text);
    const t = addTyping();

    try {
      const data = await api("POST", `/chats/${currentId}/message`, { message: text });
      t.remove();
      addBot(data.response);
      await loadChats();
    } catch {
      t.remove();
      addBot("[error: server unreachable]");
    }

    busy = false;
    enableInput(true);
    inp.focus();
  }

  function quickPrompt(btn) {
    newChat().then(() => {
      document.getElementById("inp").value = btn.textContent.trim();
      sendMsg();
    });
  }

  function addUser(text) {
    const m = document.getElementById("messages");
    const d = document.createElement("div");
    d.className = "msg user";
    d.innerHTML = `<div class="msg-role">you</div><div class="msg-content">${esc(text)}</div>`;
    m.appendChild(d);
    d.scrollIntoView({ block: "end", behavior: "smooth" });
  }

  function addBot(text) {
    const m = document.getElementById("messages");
    const d = document.createElement("div");
    d.className = "msg bot";
    d.innerHTML = `<div class="msg-role">farm ai</div><div class="msg-content"></div>`;
    renderContent(d.querySelector(".msg-content"), text);
    m.appendChild(d);
    d.scrollIntoView({ block: "end", behavior: "smooth" });
  }

  function addTyping() {
    const m = document.getElementById("messages");
    const d = document.createElement("div");
    d.className = "msg bot";
    d.innerHTML = `<div class="msg-role">farm ai</div><div class="typing"><b></b><b></b><b></b></div>`;
    m.appendChild(d);
    d.scrollIntoView({ block: "end", behavior: "smooth" });
    return d;
  }

  function renderContent(el, text) {
    const parts = text.split(/(```[ \t]*\w*[ \t]*\n[\s\S]*?```)/g);
    parts.forEach(p => {
      if (p.startsWith("```")) {
        const lines = p.split("\n");
        const lang = lines[0].replace(/`/g, "").trim() || "code";
        const code = lines.slice(1).join("\n").replace(/```\s*$/, "").trimEnd();
        const block = document.createElement("div");
        block.className = "code-block";
        block.innerHTML = `
          <div class="code-header">
            <span class="code-lang">${esc(lang)}</span>
            <button class="copy-btn" onclick="copyCode(this)">copy</button>
          </div>
          <div class="code-body">${esc(code)}</div>`;
        el.appendChild(block);
      } else if (p) {
        const span = document.createElement("span");
        span.innerHTML = esc(p).replace(/`([^`]+)`/g, '<code>$1</code>');
        el.appendChild(span);
      }
    });
  }

  function copyCode(btn) {
    navigator.clipboard.writeText(btn.closest(".code-block").querySelector(".code-body").textContent);
    btn.textContent = "copied!";
    setTimeout(() => btn.textContent = "copy", 1500);
  }

  function esc(t) {
    return String(t).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }
  function resize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 160) + "px";
  }
  function onKey(e) {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMsg(); }
  }
  function enableInput(on) {
    document.getElementById("inp").disabled = !on;
    document.getElementById("sendBtn").disabled = !on;
  }
  function setTopbar(name, sub) {
    document.getElementById("topName").textContent = name;
    document.getElementById("topSub").textContent = sub;
  }
  function setConn(on) {
    document.getElementById("connDot").className = "conn-dot" + (on ? " on" : "");
    document.getElementById("connText").textContent = on ? "connected" : "offline";
  }

  loadChats();
  setInterval(loadChats, 8000);
</script>
</body>
</html>
